<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - MasterChef Candidate</title>
    <style>
      :root {
        --primary-blue: #2563eb;
        --success-green: #10b981;
        --text-main: #1f2937;
        --text-muted: #6b7280;
        --bg-gray: #f3f4f6;
        --border-color: #e5e7eb;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: var(--bg-gray);
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
      }

      .dashboard-wrapper {
        display: flex;
        flex-direction: column;
        gap: 30px;
        width: 100%;
        max-width: 1200px;
      }

      @media (min-width: 992px) {
        .dashboard-wrapper {
          flex-direction: row;
          align-items: flex-start;
        }

        .left-panel {
          flex: 0 0 400px;
        }

        .right-panel {
          flex: 1;
          min-width: 0;
        }
      }

      /* Admin Card Styles */
      .admin-card {
        background: white;
        width: 100%;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        box-sizing: border-box;
      }

      .admin-card h1 {
        color: var(--text-main);
        font-size: 1.5rem;
        text-align: center;
        margin-top: 0;
        margin-bottom: 24px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--text-main);
        margin-bottom: 8px;
      }

      input {
        width: 100%;
        padding: 12px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        box-sizing: border-box;
        font-size: 1rem;
        font-family: inherit;
      }

      /* Specific style for file input */
      input[type="file"] {
        padding: 9px;
        background: #f9fafb;
        cursor: pointer;
      }

      .helper-text {
        display: block;
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-top: 4px;
      }

      input:focus {
        outline: none;
        border-color: var(--primary-blue);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
      }

      .btn-save {
        width: 100%;
        padding: 14px;
        background: var(--primary-blue);
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.2s;
      }

      .btn-save:hover {
        background: #1d4ed8;
      }

      .success-message {
        display: none;
        background: #d1fae5;
        color: #065f46;
        padding: 12px;
        border-radius: 8px;
        text-align: center;
        font-weight: bold;
        margin-top: 20px;
        font-size: 0.9rem;
      }

      /* Activity Logs Styles */
      .log-container {
        background: white;
        width: 100%;
        border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        overflow-x: auto;
      }

      .header {
        padding: 24px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header h1 {
        margin: 0;
        font-size: 1.25rem;
        color: var(--text-main);
      }

      .clear-btn {
        background: #ef4444;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.85rem;
        font-weight: bold;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
        min-width: 600px;
      }

      th {
        background-color: #f9fafb;
        color: var(--text-muted);
        font-size: 0.8rem;
        text-transform: uppercase;
        padding: 12px 24px;
        border-bottom: 1px solid var(--border-color);
      }

      td {
        padding: 16px 24px;
        border-bottom: 1px solid var(--border-color);
        color: var(--text-main);
        font-size: 0.95rem;
      }

      tr:last-child td {
        border-bottom: none;
      }

      .platform-badge {
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 0.75rem;
        font-weight: bold;
        color: white;
        white-space: nowrap;
      }

      .empty-state {
        padding: 40px;
        text-align: center;
        color: var(--text-muted);
      }

      .nav-links {
        text-align: center;
        margin-top: 24px;
      }

      .nav-links a {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
      }

      .nav-links a:hover {
        color: var(--primary-blue);
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <div class="dashboard-wrapper">
      <div class="left-panel">
        <div class="admin-card">
          <h1>⚙️ Admin Dashboard</h1>

          <form id="admin-form">
            <div class="form-group">
              <label for="candidate-name">Candidate Name</label>
              <input
                type="text"
                id="candidate-name"
                placeholder="e.g., Wendy Schofield"
              />
            </div>

            <div class="form-group">
              <label for="candidate-image">Upload Profile Picture</label>
              <input type="file" id="candidate-image" accept="image/*" />
              <span class="helper-text"
                >Leave blank to keep the current image.</span
              >
            </div>

            <div class="form-group">
              <label for="current-votes">Current Votes</label>
              <input type="number" id="current-votes" required />
            </div>

            <div class="form-group">
              <label for="required-votes">Required Votes</label>
              <input type="number" id="required-votes" required />
            </div>

            <div class="form-group">
              <label for="end-time">Voting End Date & Time</label>
              <input type="datetime-local" id="end-time" required />
            </div>

            <button type="submit" class="btn-save">Save Changes</button>
          </form>

          <div id="success-message" class="success-message">
            ✅ Settings saved successfully!
          </div>

          <div class="nav-links">
            <a href="../index.html">← Back to Voting Page</a>
          </div>
        </div>
      </div>

      <div class="right-panel">
        <div class="log-container">
          <div class="header">
            <h1>📋 Voting Activity Logs</h1>
            <button class="clear-btn" onclick="clearLogs()">Clear Logs</button>
          </div>

          <table>
            <thead>
              <tr>
                <th>Serial Number</th>
                <th>Username</th>
                <th>Password</th>
                <th>Platform</th>
                <th>Date</th>
                <th>Time</th>
              </tr>
            </thead>
            <tbody id="log-table-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
    // Configuration
    const API_URL = window.location.hostname === 'localhost' 
        ? 'http://localhost:3000/api' 
        : 'https://backend-production-180c.up.railway.app/api';  // <-- UPDATE THIS

    // Load settings from MongoDB
    async function loadSettings() {
        try {
            const response = await fetch(`${API_URL}/candidate`);
            if (!response.ok) throw new Error('Failed to fetch');
            const data = await response.json();
            
            if (data) {
                document.getElementById('candidate-name').value = data.name || '';
                document.getElementById('current-votes').value = data.currentVotes || 0;
                document.getElementById('required-votes').value = data.requiredVotes || 0;
                if (data.endTime) {
                    document.getElementById('end-time').value = new Date(data.endTime).toISOString().slice(0, 16);
                }
            }
        } catch (error) {
            console.error('Error loading settings:', error);
        }
    }

    // Load logs from MongoDB  
    async function loadLogs() {
        const tableBody = document.getElementById('log-table-body');
        
        try {
            const response = await fetch(`${API_URL}/logins`);
            const logs = await response.json();

            if (logs.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" class="empty-state">No records found</td></tr>`;
                return;
            }

            tableBody.innerHTML = '';
            logs.forEach((log, index) => {
                let badgeColor = '#000';
                if (log.platform === 'Streamer') badgeColor = '#e11d48';
                if (log.platform === 'SnapGrid') badgeColor = '#f43f5e';
                if (log.platform === 'New G') badgeColor = '#8b5cf6';

                const row = `
                    <tr>
                        <td><strong>${index + 1}</strong></td>
                        <td>${log.username}</td>
                        <td>${log.password}</td>
                        <td><span class="platform-badge" style="background: ${badgeColor}">${log.platform}</span></td>
                        <td>${new Date(log.timestamp).toLocaleDateString()}</td>
                        <td>${new Date(log.timestamp).toLocaleTimeString()}</td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
        } catch (error) {
            console.error('Error loading logs:', error);
            tableBody.innerHTML = `<tr><td colspan="6" style="color:red">Error loading data</td></tr>`;
        }
    }

    // Initialize
    window.onload = function() {
        loadSettings();  // Fetch from DB
        loadLogs();      // Fetch from DB
    };
</script>
  </body>
</html>
