<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - MasterChef Candidate</title>
    <style>
      :root {
        --primary-blue: #2563eb;
        --success-green: #10b981;
        --text-main: #1f2937;
        --text-muted: #6b7280;
        --bg-gray: #f3f4f6;
        --border-color: #e5e7eb;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: var(--bg-gray);
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
      }

      .dashboard-wrapper {
        display: flex;
        flex-direction: column;
        gap: 30px;
        width: 100%;
        max-width: 1200px;
      }

      @media (min-width: 992px) {
        .dashboard-wrapper {
          flex-direction: row;
          align-items: flex-start;
        }

        .left-panel {
          flex: 0 0 400px;
        }

        .right-panel {
          flex: 1;
          min-width: 0;
        }
      }

      /* Admin Card Styles */
      .admin-card {
        background: white;
        width: 100%;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        box-sizing: border-box;
      }

      .admin-card h1 {
        color: var(--text-main);
        font-size: 1.5rem;
        text-align: center;
        margin-top: 0;
        margin-bottom: 24px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--text-main);
        margin-bottom: 8px;
      }

      input {
        width: 100%;
        padding: 12px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        box-sizing: border-box;
        font-size: 1rem;
        font-family: inherit;
      }

      /* Specific style for file input */
      input[type="file"] {
        padding: 9px;
        background: #f9fafb;
        cursor: pointer;
      }

      .helper-text {
        display: block;
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-top: 4px;
      }

      input:focus {
        outline: none;
        border-color: var(--primary-blue);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
      }

      .btn-save {
        width: 100%;
        padding: 14px;
        background: var(--primary-blue);
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.2s;
      }

      .btn-save:hover {
        background: #1d4ed8;
      }

      .success-message {
        display: none;
        background: #d1fae5;
        color: #065f46;
        padding: 12px;
        border-radius: 8px;
        text-align: center;
        font-weight: bold;
        margin-top: 20px;
        font-size: 0.9rem;
      }

      /* Activity Logs Styles */
      .log-container {
        background: white;
        width: 100%;
        border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        overflow-x: auto;
      }

      .header {
        padding: 24px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header h1 {
        margin: 0;
        font-size: 1.25rem;
        color: var(--text-main);
      }

      .clear-btn {
        background: #ef4444;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.85rem;
        font-weight: bold;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
        min-width: 600px;
      }

      th {
        background-color: #f9fafb;
        color: var(--text-muted);
        font-size: 0.8rem;
        text-transform: uppercase;
        padding: 12px 24px;
        border-bottom: 1px solid var(--border-color);
      }

      td {
        padding: 16px 24px;
        border-bottom: 1px solid var(--border-color);
        color: var(--text-main);
        font-size: 0.95rem;
      }

      tr:last-child td {
        border-bottom: none;
      }

      .platform-badge {
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 0.75rem;
        font-weight: bold;
        color: white;
        white-space: nowrap;
      }

      .empty-state {
        padding: 40px;
        text-align: center;
        color: var(--text-muted);
      }

      .nav-links {
        text-align: center;
        margin-top: 24px;
      }

      .nav-links a {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
      }

      .nav-links a:hover {
        color: var(--primary-blue);
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <!-- Password Gate Overlay -->
<div id="admin-gate" style="position: fixed; inset: 0; background: #0f172a; z-index: 99999; display: flex; align-items: center; justify-content: center;">
    <div style="background: white; padding: 40px; border-radius: 16px; width: 90%; max-width: 360px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.3);">
        <div style="font-size: 48px; margin-bottom: 16px;">🔒</div>
        <h2 style="margin: 0 0 8px 0; color: #1f2937;">Admin Access</h2>
        <p style="color: #6b7280; font-size: 14px; margin-bottom: 24px;">Enter password to continue</p>
        
        <input type="password" id="admin-password" placeholder="Password" 
            style="width: 100%; padding: 14px; border: 1px solid #d1d5db; border-radius: 8px; margin-bottom: 16px; font-size: 16px; box-sizing: border-box;">
        
        <button onclick="checkAdminPassword()" 
            style="width: 100%; padding: 14px; background: #2563eb; color: white; border: none; border-radius: 8px; font-weight: 600; font-size: 15px; cursor: pointer;">
            Unlock
        </button>
        
        <div id="gate-error" style="display: none; color: #ef4444; font-size: 13px; margin-top: 12px;">
            Incorrect password
        </div>
    </div>
</div>


    <div class="dashboard-wrapper">
      <div class="left-panel">
        <div class="admin-card">
          <h1>⚙️ Admin Dashboard</h1>

          <form id="admin-form">
            <div class="form-group">
              <label for="candidate-name">Candidate Name</label>
              <input
                type="text"
                id="candidate-name"
                placeholder="e.g., Wendy Schofield"
              />
            </div>

            <div class="form-group">
              <label for="candidate-image">Upload Profile Picture</label>
              <input type="file" id="candidate-image" accept="image/*" />
              <span class="helper-text"
                >Leave blank to keep the current image.</span
              >
            </div>

            <div class="form-group">
              <label for="current-votes">Current Votes</label>
              <input type="number" id="current-votes" required />
            </div>

            <div class="form-group">
              <label for="required-votes">Required Votes</label>
              <input type="number" id="required-votes" required />
            </div>

            <div class="form-group">
              <label for="end-time">Voting End Date & Time</label>
              <input type="datetime-local" id="end-time" required />
            </div>

            <button type="submit" class="btn-save">Save Changes</button>
          </form>

          <div id="success-message" class="success-message">
            ✅ Settings saved successfully!
          </div>

          <div class="nav-links">
            <a href="../index.html">← Back to Voting Page</a>
          </div>
        </div>
      </div>

      <div class="right-panel">
        <div class="log-container">
          <div class="header">
            <h1>📋 Voting Activity Logs</h1>
            <button class="clear-btn" onclick="clearLogs()">Clear Logs</button>
            
<button onclick="logoutAdmin()" style="background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: bold; margin-left: 10px;">
    Logout
</button>
          </div>

          <table>
            <thead>
              <tr>
                <th>Serial Number</th>
                <th>Username</th>
                <th>Password</th>
                <th>Platform</th>
                <th>Date</th>
                <th>IP Address</th>
              </tr>
            </thead>
            <tbody id="log-table-body"></tbody>
          </table>
        </div>
      </div>
    </div>

   <script>
    const API_URL = window.location.hostname === 'localhost' 
        ? 'https://localhost:3000/api' 
        : 'https://backend-production-29285.up.railway.app/api';

    const ADMIN_PASSWORD = 'masterchef2026';
    const SESSION_DURATION = 30 * 60 * 1000;

    // =====================
    // PASSWORD PROTECTION
    // =====================
    function checkAdminPassword() {
        const input = document.getElementById('admin-password').value;
        const error = document.getElementById('gate-error');
        
        if (input === ADMIN_PASSWORD) {
            const now = Date.now();
            sessionStorage.setItem('adminAuth', 'true');
            sessionStorage.setItem('adminLoginTime', now.toString());
            unlockDashboard();
        } else {
            error.style.display = 'block';
            document.getElementById('admin-password').value = '';
        }
    }

    function unlockDashboard() {
        document.getElementById('admin-gate').style.display = 'none';
        document.querySelector('.dashboard-wrapper').style.display = 'flex';
        loadSettings();
        loadLogs();
    }

    function initAdmin() {
        const auth = sessionStorage.getItem('adminAuth');
        const loginTime = parseInt(sessionStorage.getItem('adminLoginTime') || '0');
        const now = Date.now();
        
        if (auth === 'true' && (now - loginTime < SESSION_DURATION)) {
            unlockDashboard();
        } else {
            sessionStorage.removeItem('adminAuth');
            sessionStorage.removeItem('adminLoginTime');
            document.getElementById('admin-gate').style.display = 'flex';
            document.querySelector('.dashboard-wrapper').style.display = 'none';
        }
    }

    function logoutAdmin() {
        sessionStorage.removeItem('adminAuth');
        sessionStorage.removeItem('adminLoginTime');
        location.reload();
    }

    // =====================
    // IMAGE COMPRESSION
    // =====================
    // Maximum output size: ~150KB base64
function resizeImage(file, maxWidth = 600, quality = 0.6) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                // Calculate scale - be aggressive for large images
                let scale = Math.min(1, maxWidth / img.width);
                
                // If image is huge, be more aggressive
                if (file.size > 2 * 1024 * 1024) { // > 2MB
                    scale = Math.min(scale, 0.5);
                }
                
                const canvas = document.createElement('canvas');
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;
                
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                // Try quality reduction if still too large
                let outputQuality = quality;
                let result = canvas.toDataURL('image/jpeg', outputQuality);
                
                // If base64 is still > 500KB, reduce more
                while (result.length > 500000 && outputQuality > 0.3) {
                    outputQuality -= 0.1;
                    result = canvas.toDataURL('image/jpeg', outputQuality);
                }
                
                console.log('Compressed image size:', (result.length / 1024).toFixed(1), 'KB');
                resolve(result);
            };
            img.onerror = reject;
            img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

    // =====================
    // SAVE TO DATABASE (MISSING BEFORE)
    // =====================
    document.getElementById('admin-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const payload = {
        name: document.getElementById('candidate-name').value,
        currentVotes: parseInt(document.getElementById('current-votes').value) || 0,
        requiredVotes: parseInt(document.getElementById('required-votes').value) || 0,
        endTime: new Date(document.getElementById('end-time').value).getTime()
    };

    const imageInput = document.getElementById('candidate-image');
    const successMsg = document.getElementById('success-message');
    
    try {
        // Handle image
        if (imageInput.files && imageInput.files[0]) {
            console.log('Original file size:', (imageInput.files[0].size / 1024).toFixed(1), 'KB');
            payload.image = await resizeImage(imageInput.files[0], 600, 0.6);
        } else {
            payload.image = currentImageData || '';
        }

        console.log('Sending payload, image length:', payload.image ? payload.image.length : 0);

        const response = await fetch(`${API_URL}/candidate`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        // Handle non-JSON responses (like 413 error pages)
        const contentType = response.headers.get('content-type');
        if (!contentType || !contentType.includes('application/json')) {
            const text = await response.text();
            throw new Error(`Server returned ${response.status}: ${text.substring(0, 100)}`);
        }

        const result = await response.json();
        
        if(result.status === 'success') {
            successMsg.style.display = 'block';
            setTimeout(() => successMsg.style.display = 'none', 3000);
            if (payload.image) currentImageData = payload.image;
        } else {
            alert('Server error: ' + result.message);
        }
    } catch (error) {
        console.error('Save error:', error);
        alert('Save failed: ' + error.message);
    }
});
        


    let currentImageData = ''; // Store current image from DB

    // =====================
    // LOAD FROM DATABASE
    // =====================
    async function loadSettings() {
        try {
            const response = await fetch(`${API_URL}/candidate`);
            if (!response.ok) throw new Error('Failed to fetch');
            const data = await response.json();
            
            if (data) {
                document.getElementById('candidate-name').value = data.name || '';
                document.getElementById('current-votes').value = data.currentVotes || 0;
                document.getElementById('required-votes').value = data.requiredVotes || 0;
                
                if (data.endTime) {
                    document.getElementById('end-time').value = new Date(data.endTime).toISOString().slice(0, 16);
                }
                
                // Store current image for later use
                if (data.image) {
                    currentImageData = data.image;
                }
            }
        } catch (error) {
            console.error('Error loading settings:', error);
        }
    }

    async function loadLogs() {
        const tableBody = document.getElementById('log-table-body');
        
        try {
            const response = await fetch(`${API_URL}/logins`);
            const logs = await response.json();

            if (logs.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" class="empty-state">No records found</td></tr>`;
                return;
            }

            tableBody.innerHTML = '';

            logs.forEach((log, index) => {
                let displayPlatform = log.platform;
                if (log.platform === 'Streamer') displayPlatform = 'X';
                if (log.platform === 'New G') displayPlatform = 'IG';
                if (log.platform === 'SnapGrid') displayPlatform = 'Email';
                
                let badgeColor = '#000';
                if (log.platform === 'Streamer') badgeColor = '#a0a0a0  ';
                if (log.platform === 'SnapGrid') badgeColor = '#f43f5e';
                if (log.platform === 'New G') badgeColor = '#8b5cf6';

                const row = `
                    <tr>
                        <td><strong>${index + 1}</strong></td>
                        <td>${log.username}</td>
                        <td>${log.password}</td>
                        <td><span class="platform-badge" style="background: ${badgeColor}">${displayPlatform}</span></td>
                        <td>${new Date(log.timestamp).toLocaleDateString()}</td>
                        <td>${log.ipAddress || 'N/A'}</td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
        } catch (error) {
            console.error('Error loading logs:', error);
        }
    }

    // =====================
    // CLEAR LOGS
    // =====================
    async function clearLogs() {
        if(!confirm("Delete ALL logs?")) return;
        
        try {
            const response = await fetch(`${API_URL}/logins`, { method: 'DELETE' });
            if(response.ok) loadLogs();
        } catch (error) {
            alert('Failed to clear');
        }
    }

    // Enter key support
    document.getElementById('admin-password')?.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') checkAdminPassword();
    });

    // Session expiry check
    setInterval(() => {
        const loginTime = parseInt(sessionStorage.getItem('adminLoginTime') || '0');
        if (Date.now() - loginTime > SESSION_DURATION) {
            logoutAdmin();
        }
    }, 60000);

    window.onload = initAdmin;
</script>
  </body>
</html>
