<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - MasterChef Candidate</title>
    <style>
        :root {
            --primary-blue: #2563eb;
            --success-green: #10b981;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --bg-gray: #f3f4f6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-gray);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .admin-card {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
        }

        h1 {
            color: var(--text-main);
            font-size: 1.5rem;
            text-align: center;
            margin-top: 0;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }

        .btn-save {
            width: 100%;
            padding: 14px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-save:hover {
            background: #1d4ed8;
        }

        .success-message {
            display: none;
            background: #d1fae5;
            color: #065f46;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .nav-links {
            text-align: center;
            margin-top: 24px;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .nav-links a:hover {
            color: var(--primary-blue);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="admin-card">
        <h1>⚙️ Admin Dashboard</h1>
        
        <form id="admin-form">
            <div class="form-group">
                <label for="current-votes">Current Votes</label>
                <input type="number" id="current-votes" required>
            </div>

            <div class="form-group">
                <label for="required-votes">Required Votes</label>
                <input type="number" id="required-votes" required>
            </div>

            <div class="form-group">
                <label for="end-time">Voting End Date & Time</label>
                <input type="datetime-local" id="end-time" required>
            </div>

            <button type="submit" class="btn-save">Save Changes</button>
        </form>

        <div id="success-message" class="success-message">
            ✅ Settings saved successfully!
        </div>

        <div class="nav-links">
            <a href="../index.html">← Back to Voting Page</a>
        </div>
    </div>

    <script>
        // --- 1. HELPER FUNCTION TO FORMAT DATE FOR HTML INPUT ---
        // HTML datetime-local inputs require a very specific format (YYYY-MM-DDThh:mm)
        function formatToLocalDatetime(timestamp) {
            const date = new Date(parseInt(timestamp));
            // Adjust for the user's local timezone offset
            const offset = date.getTimezoneOffset() * 60000;
            const localISOTime = (new Date(date - offset)).toISOString().slice(0, 16);
            return localISOTime;
        }

        // --- 2. LOAD DATA ON PAGE START ---
        window.onload = function() {
            // Check if there is data in localStorage, if so, populate the inputs
            if (localStorage.getItem('currentVotes')) {
                document.getElementById('current-votes').value = localStorage.getItem('currentVotes');
            }
            if (localStorage.getItem('requiredVotes')) {
                document.getElementById('required-votes').value = localStorage.getItem('requiredVotes');
            }
            if (localStorage.getItem('endTime')) {
                document.getElementById('end-time').value = formatToLocalDatetime(localStorage.getItem('endTime'));
            }
        };

        // --- 3. SAVE DATA ON FORM SUBMIT ---
        document.getElementById('admin-form').addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent page from refreshing

            // Get values from inputs
            const newCurrent = document.getElementById('current-votes').value;
            const newRequired = document.getElementById('required-votes').value;
            const newEndDate = document.getElementById('end-time').value;

            // Convert the selected HTML date back into a normal timestamp
            const newTimestamp = new Date(newEndDate).getTime();

            // Save to localStorage
            localStorage.setItem('currentVotes', newCurrent);
            localStorage.setItem('requiredVotes', newRequired);
            localStorage.setItem('endTime', newTimestamp);

            // Show success message
            const successMsg = document.getElementById('success-message');
            successMsg.style.display = 'block';

            // Hide the message after 3 seconds
            setTimeout(() => {
                successMsg.style.display = 'none';
            }, 3000);
        });
    </script>
</body>
</html>
